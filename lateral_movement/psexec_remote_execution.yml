title: PsExec Remote Execution
id: b2c3d4e5-0002-4f6a-b7c8-d9e0f1a2b3c4
status: stable
description: >
  Detects use of PsExec or PsExec-like tooling for lateral movement.
  Attackers commonly use PsExec (T1021.002) to execute code on remote
  systems after gaining initial access.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/psexec
author: farooqmail77-dotcom
date: 2024/01/01
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.execution
logsource:
  product: windows
  service: system
detection:
  selection_service:
    EventID: 7045    # Service installed
    ServiceName: PSEXESVC
  selection_network:
    EventID: 3       # Sysmon network connection
    Image|endswith:
      - '\psexec.exe'
      - '\psexec64.exe'
      - '\PsExec.exe'
  condition: selection_service or selection_network
falsepositives:
  - Legitimate use by IT administrators
  - Authorized remote management tools
level: high
fields:
  - ServiceName
  - ServiceFileName
  - Computer
  - User
