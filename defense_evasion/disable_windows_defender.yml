title: Windows Defender Disabled via PowerShell
id: c3d4e5f6-0003-4a7b-c8d9-e0f1a2b3c4d5
status: stable
description: >
  Detects attempts to disable Windows Defender via PowerShell cmdlets.
  Attackers disable AV/EDR products (T1562.001) to reduce detection
  likelihood before deploying payloads.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: farooqmail77-dotcom
date: 2024/01/01
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Set-MpPreference'
      - 'DisableRealtimeMonitoring'
      - 'DisableAntiSpyware'
      - 'DisableBehaviorMonitoring'
      - 'DisableBlockAtFirstSeen'
  condition: selection
falsepositives:
  - Legitimate IT automation scripts
  - AV management platforms
level: high
fields:
  - CommandLine
  - ParentImage
  - User
  - Computer
